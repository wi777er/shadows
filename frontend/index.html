<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shadow Survivor</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>
    <div id="app">
        <div id="loading-screen">
            <h1>Shadow Survivor</h1>
            <p>Loading...</p>
        </div>
        <div id="game-container"></div>
        <div id="battle-overlay" class="hidden">
            <h1>Shadow Survivor</h1>
            <p id="battle-status">Join the arena</p>
            <button id="join-battle-btn">⚔️ Join Battle</button>
        </div>
        <div id="nickname-overlay" class="hidden">
            <h1>Shadow Survivor</h1>
            <p>Enter your nickname</p>
            <input id="nickname-input" type="text" maxlength="20" placeholder="Your name..." />
            <button id="nickname-btn">▶ Start Game</button>
        </div>
        <div id="death-overlay" class="hidden">
            <h2>💀 You Died</h2>
            <p id="death-info">Level 1 | Kills: 0</p>
            <button id="return-btn">🔄 Return</button>
            <button id="change-map-btn">🌍 Change Map</button>
        </div>
        <div id="upgrade-overlay" class="hidden">
            <h2>⬆️ Level Up!</h2>
            <p>Choose upgrade:</p>
            <button class="upgrade-btn" data-stat="damage">🗡️ +5 Damage</button>
            <button class="upgrade-btn" data-stat="maxHp">💜 +25 Max HP</button>
            <button class="upgrade-btn" data-stat="speed">💨 +15 Speed</button>
        </div>
        <div id="ui-overlay">
            <div id="top-bar">
                <div id="player-info">
                    <span id="player-name"></span>
                    <span id="player-level">Lv. 1</span>
                </div>
                <div id="stats">
                    <span id="hp-bar">
                        <span id="hp-fill"></span>
                        <span id="hp-text">100/100</span>
                    </span>
                </div>
                <div id="exp-bar">
                    <span id="exp-fill"></span>
                    <span id="exp-text">0/100</span>
                </div>
                <div id="kill-counter">Kills: 0</div>
            </div>
        </div>
    </div>
    <script>
        window.__gameLoaded = false;
        setTimeout(function () {
            if (!window.__gameLoaded) {
                var el = document.getElementById('loading-screen');
                if (el) el.innerHTML = '<h1 style="color:#e74c3c">Ошибка загрузки</h1><p style="color:#fff;font-size:14px;padding:20px">JS файл не выполнился — синтаксическая ошибка</p>';
            }
        }, 5000);
    </script>
    <script src="game.js"></script>
</body>
</html>
